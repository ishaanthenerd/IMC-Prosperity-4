[project]
name = "prosperity4btx"
description = "Backtester for IMC Prosperity 4 algorithms (based on Jasper van Merle's Prosperity 3 Backtester)"
version = "1.0.2+imc.1"
readme = "README.md"
license = {file = "LICENSE"}
authors = [{name = "Xeeshan", email = "mzeeshan.p0615@gmail.com"}]
keywords = ["imc", "prosperity", "backtest", "backtester"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]
requires-python = ">= 3.9"
dependencies = [
    "ipython>=8.18.1",
    "jsonpickle>=4.0.2",
    "orjson>=3.10.15",
    "tqdm>=4.67.1",
    "typer>=0.15.2",
]

[build-system]
requires = ["setuptools >= 61.0"]
build-backend = "setuptools.build_meta"

[project.scripts]
prosperity4btx = "prosperity4bt.__main__:main"

[project.urls]
Repository = "https://github.com/xeeshan85/imc-prosperity-4-backtester"
Issues = "https://github.com/xeeshan85/imc-prosperity-4-backtester/issues"
Changelog = "https://github.com/xeeshan85/imc-prosperity-4-backtester/releases"

[tool.setuptools.packages.find]
include = ["prosperity4bt", "prosperity4bt.*"]

[tool.setuptools.package-data]
prosperity4bt = ["py.typed", "resources/**/*.csv"]

[dependency-groups]
dev = [
    "build",
    "mypy",
    "ruff",
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
extend-select = ["I"]

[tool.mypy]
ignore_missing_imports = true
explicit_package_bases = true
namespace_packages = true

[[tool.mypy.overrides]]
module = "prosperity4bt.datamodel"
ignore_errors = true
